name: Build

on:
  push:
    branches: ["master"]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
  pull_request:


jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          ssh-key: ${{ secrets.SSH_KEY }}
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.1
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Remove Android's cmake
        shell: bash
        run: rm -rf $ANDROID_HOME/cmake
      - name: Build with Gradle
        run: |
          ccache -o cache_dir=${{ github.workspace }}/.ccache
          ccache -o hash_dir=false
          ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
          ccache -p
          echo 'android.native.buildOutput=verbose' >> gradle.properties
          ./gradlew :lsplant:publishToMavenLocal :lsplant:prefabDebugPackage
          ./gradlew --stop
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.maven_pgp_signingKey }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.maven_pgp_signingPassword }}
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-library
          path: ~/.m2
          include-hidden-files: true

  test:
    needs: build
    name: Test on API ${{ matrix.android.api }} ${{ matrix.android.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        android:
          - { api: '21', target: 'default',    arch: "x86_64" }
          - { api: '21', target: 'default',    arch: "x86"    }
          - { api: '22', target: 'default',    arch: "x86_64" }
          - { api: '22', target: 'default',    arch: "x86"    }
          - { api: '23', target: 'default',    arch: "x86_64" }
          - { api: '23', target: 'default',    arch: "x86"    }
          - { api: '24', target: 'default',    arch: "x86_64" }
          - { api: '24', target: 'default',    arch: "x86"    }
          - { api: '25', target: 'default',    arch: "x86_64" }
          - { api: '25', target: 'default',    arch: "x86"    }
          - { api: '26', target: 'default',    arch: "x86_64" }
          - { api: '26', target: 'default',    arch: "x86"    }
          - { api: '27', target: 'default',    arch: "x86_64" }
          - { api: '27', target: 'default',    arch: "x86"    }
          - { api: '28', target: 'default',    arch: "x86_64" }
          - { api: '28', target: 'default',    arch: "x86"    }
          - { api: '29', target: 'default',    arch: "x86_64" }
          - { api: '29', target: 'default',    arch: "x86"    }
          - { api: '30', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '30', target: 'aosp_atd',   arch: "x86"    }
          - { api: '31', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '31', target: 'android-tv', arch: "x86"    }
          - { api: '32', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '33', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '33', target: 'android-tv', arch: "x86"    }
          - { api: '34', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '34', target: 'android-tv', arch: "x86"    }
          - { api: '35', target: 'aosp_atd',   arch: "x86_64" }
          - { api: '36', target: 'default',    arch: "x86_64" }
          - { api: 'CinnamonBun', target: 'google_apis_ps16k', arch: 'x86_64' }  # Android 17 QPR1 Beta
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          ssh-key: ${{ secrets.SSH_KEY }}
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.1
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}
          save: false
      - name: Enable KVM group perms
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
      - name: run tests
        uses: reactivecircus/android-emulator-runner@dc0214ac9162729da746d9a3f1bf79bfd00fdc48
        with:
          api-level: ${{ matrix.android.api }}
          arch: ${{ matrix.android.arch }}
          target: ${{ matrix.android.target }}
          script: |
            rm -rf $ANDROID_HOME/cmake
            ccache -o cache_dir=${{ github.workspace }}/.ccache
            ccache -o hash_dir=false
            ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
            ./gradlew :test:connectedCheck
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          avd-name: ${{ matrix.android.api }}_${{ matrix.android.arch }}
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs-${{ matrix.android.api }}-${{ matrix.android.arch }}-${{ matrix.android.target }}
          path: |
            test/build/outputs
            !test/build/outputs/apk

  cf-test:
    name: Test ${{ matrix.device }}
    runs-on: ubuntu-24.04
    env:
      CF_HOME: /home/runner/aosp_cf_phone
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: "aosp-android-latest-release"
            device: "aosp_cf_x86_64_only_phone"

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          ssh-key: ${{ secrets.SSH_KEY }}
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}
          save: false
      - name: Setup Cuttlefish environment
        run: |
          .github/cuttlefish.sh setup
          .github/cuttlefish.sh download ${{ matrix.branch }} ${{ matrix.device }}
          curl -LO https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-linux.zip
          unzip ninja-linux.zip -d $ANDROID_HOME/platform-tools
          chmod +x $ANDROID_HOME/platform-tools/ninja
          rm -rf $ANDROID_HOME/cmake
          ccache -o cache_dir=${{ github.workspace }}/.ccache
          ccache -o hash_dir=false
          ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
      - name: Run Cuttlefish test
        timeout-minutes: 10
        run: sudo -E -u $USER .github/cuttlefish.sh test
      - name: Upload logs on error
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: "cvd-logs-${{ matrix.device }}"
          path: |
            /home/runner/aosp_cf_phone/cuttlefish/instances/cvd-1/logs
            /home/runner/aosp_cf_phone/cuttlefish/instances/cvd-1/cuttlefish_config.json
